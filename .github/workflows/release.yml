name: Production Release

on:
  push:
    tags:
      - "v1.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v1.x tag to build
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production-release-${{ github.ref }}-${{ inputs.tag }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  validate:
    runs-on: ubuntu-22.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - run: npm ci
      - name: Verify tag and project versions
        run: node scripts/release-assets.mjs verify-version --tag "$RELEASE_TAG"
      - name: Verify locked Rust dependency graph
        run: cargo metadata --locked --manifest-path src-tauri/Cargo.toml --format-version 1 --no-deps
      - name: Run production quality gate
        run: npm run verify:linux

  build:
    needs: validate
    name: Package ${{ matrix.platform }} ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            arch: x64
            runner: windows-2022
            target: x86_64-pc-windows-msvc
            bundles: nsis,msi
            linux: false
          - platform: windows
            arch: arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundles: nsis,msi
            linux: false
          - platform: linux
            arch: x64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb,rpm
            linux: true
          - platform: linux
            arch: arm64
            runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            bundles: appimage,deb,rpm
            linux: true
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    env:
      APPIMAGE_EXTRACT_AND_RUN: "1"

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Resolve immutable release commit
        id: release-ref
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install Tauri system dependencies
        if: matrix.linux
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            pkg-config \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            xvfb \
            xdotool \
            dbus-x11

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
          key: release-${{ matrix.target }}
          cache-targets: false

      - run: npm ci

      - name: Build native packages
        run: node scripts/tauri.mjs build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} -- --locked

      - name: Normalize release asset names
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          node scripts/release-assets.mjs collect \
            --source "src-tauri/target/${{ matrix.target }}/release/bundle" \
            --output "artifacts/${{ matrix.platform }}-${{ matrix.arch }}" \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.arch }}" \
            --version "$VERSION"

      - name: Smoke Windows installers on the native runner
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          ./scripts/windows-package-smoke.ps1 -SelfTest
          ./scripts/windows-package-smoke.ps1 `
            -Architecture "${{ matrix.arch }}" `
            -ReleaseTag "$env:RELEASE_TAG" `
            -CommitSha "${{ steps.release-ref.outputs.sha }}" `
            -ArtifactDirectory "artifacts/${{ matrix.platform }}-${{ matrix.arch }}" `
            -Output "artifacts/${{ matrix.platform }}-${{ matrix.arch }}/native-smoke-${{ matrix.platform }}-${{ matrix.arch }}.json"

      - name: Smoke Linux packages on the native runner
        if: matrix.platform == 'linux'
        run: |
          node scripts/linux-package-smoke.mjs \
            --arch "${{ matrix.arch }}" \
            --tag "$RELEASE_TAG" \
            --sha "${{ steps.release-ref.outputs.sha }}" \
            --artifacts "artifacts/${{ matrix.platform }}-${{ matrix.arch }}" \
            --output "artifacts/${{ matrix.platform }}-${{ matrix.arch }}/native-smoke-${{ matrix.platform }}-${{ matrix.arch }}.json"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: packages-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/${{ matrix.platform }}-${{ matrix.arch }}/*
          if-no-files-found: error
          retention-days: 14

  verify-native-smoke:
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          pattern: packages-*
          path: downloaded-smoke-input
      - name: Verify four target-bound native package smoke records
        run: |
          RELEASE_SHA="$(git rev-parse HEAD)"
          node scripts/release-evidence.mjs verify \
            --input downloaded-smoke-input \
            --output verified-native-smoke \
            --tag "$RELEASE_TAG" \
            --sha "$RELEASE_SHA"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: verified-native-smoke
          path: verified-native-smoke/*.json
          if-no-files-found: error
          retention-days: 90

  assemble:
    needs: verify-native-smoke
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    environment: production-release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          pattern: packages-*
          path: downloaded-assets
          merge-multiple: true
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: verified-native-smoke
          path: release-assets
      - name: Assemble and verify the ten release packages
        run: |
          VERSION="${RELEASE_TAG#v}"
          node scripts/release-assets.mjs assemble \
            --input downloaded-assets \
            --output release-assets \
            --version "$VERSION"
      - name: Generate dependency SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: release-assets/CodeReader.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Verify final SPDX SBOM
        run: node scripts/release-evidence.mjs verify-sbom --path release-assets/CodeReader.spdx.json
      - name: Attest package build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: release-assets/CodeReader_*
      - name: Attest package SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: release-assets/CodeReader_*
          sbom-path: release-assets/CodeReader.spdx.json
      - name: Attest native package smoke evidence
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: release-assets/native-smoke-*.json
      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: CodeReader ${{ env.RELEASE_TAG }}
          body_path: release-assets/RELEASE-NOTES.md
          draft: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-rc.') }}
          files: release-assets/*

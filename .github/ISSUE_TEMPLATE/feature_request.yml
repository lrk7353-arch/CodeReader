name: Feature request
description: Suggest an improvement to CodeReader
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should CodeReader do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: contribution
    attributes:
      label: Are you interested in contributing this?
      options:
        - "Yes"
        - "No"
        - "Maybe"
